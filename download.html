<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文件下载 · 码上传递</title>
  <meta name="description" content="扫码下载文件 - 码上传递" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a1a;
      --card: rgba(18,18,42,0.9);
      --border: rgba(108,99,255,0.2);
      --primary: #6C63FF;
      --primary-glow: rgba(108,99,255,0.4);
      --primary-2: #a78bfa;
      --accent: #00D2FF;
      --text: #f0f0ff;
      --sub: #8888bb;
      --muted: #555580;
      --success: #38ef7d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,210,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    /* Header */
    .brand {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(10,10,26,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .brand-icon { font-size: 22px; }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--primary-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-tag {
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 3px 10px;
    }

    /* Main card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,99,255,0.1);
      backdrop-filter: blur(30px);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.18) 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.7; }
      50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
    }

    /* File icon */
    .file-icon-wrap {
      width: 88px; height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(167,139,250,0.1));
      border: 1px solid rgba(108,99,255,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 44px;
      position: relative;
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .file-icon-wrap::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      z-index: -1;
      opacity: 0.4;
      animation: borderGlow 2.5s ease-in-out infinite;
    }
    @keyframes borderGlow {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .page-title span {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-sub {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 28px;
    }

    /* File info box */
    .file-info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 24px;
      text-align: left;
    }
    .file-info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .file-info-row:last-child { margin-bottom: 0; }
    .info-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 48px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .info-value {
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
      flex: 1;
    }

    /* Download Button */
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6C63FF, #9b8aff);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 8px 32px rgba(108,99,255,0.4);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    .download-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(108,99,255,0.5);
    }
    .download-btn:hover::before { transform: translateX(100%); }
    .download-btn:active { transform: translateY(-1px); }
    .btn-icon { font-size: 20px; }

    /* Direct link */
    .direct-link-wrap {
      margin-top: 16px;
    }
    .direct-link-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .direct-link {
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .direct-link-url {
      flex: 1;
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }
    .copy-btn {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary-2);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover {
      background: rgba(108,99,255,0.25);
      color: #fff;
    }

    /* Notice */
    .notice {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .notice-icon { font-size: 14px; }

    /* Error state */
    .error-state { display: none; }
    .error-state.active { display: block; }

    /* Footer */
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .footer a {
      color: var(--primary-2);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* Loading state */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Text content display */
    .text-content-wrap {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }
    .text-content-wrap::-webkit-scrollbar { width: 4px; }
    .text-content-wrap::-webkit-scrollbar-track { background: transparent; }
    .text-content-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 500px) {
      .card { padding: 32px 22px; }
      .page-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <header class="brand">
    <span class="brand-icon">⬛</span>
    <span class="brand-name">码上传递</span>
    <span class="brand-tag">扫码下载</span>
  </header>

  <div class="card" id="mainCard">
    <!-- Loading -->
    <div id="loadingState" class="loading-wrap">
      <div class="spinner"></div>
      <p style="color:var(--sub);font-size:14px;">正在读取文件信息...</p>
    </div>

    <!-- File content (hidden until loaded) -->
    <div id="fileState" style="display:none;">
      <div class="file-icon-wrap" id="fileIconWrap">📦</div>
      <h1 class="page-title">准备就绪 <span>可以下载了</span></h1>
      <p class="page-sub">你的文件已经准备好了，点击下方按钮开始下载</p>
      <div class="file-info-box">
        <div class="file-info-row">
          <span class="info-label">文件名</span>
          <span class="info-value" id="displayName">—</span>
        </div>
        <div class="file-info-row">
          <span class="info-label">类型</span>
          <span class="info-value" id="displayType">—</span>
        </div>
      </div>
      <a id="downloadBtn" class="download-btn" href="#" target="_blank" rel="noopener">
        <span class="btn-icon">⬇️</span>
        <span>立即下载文件</span>
      </a>
      <div class="direct-link-wrap">
        <p class="direct-link-label">或复制链接到浏览器打开</p>
        <div class="direct-link">
          <span class="direct-link-url" id="directLinkText">—</span>
          <button class="copy-btn" onclick="copyLink()">复制</button>
        </div>
      </div>
      <p class="notice">
        <span class="notice-icon">⏰</span>
        文件链接有效期约 14 天，请及时下载
      </p>
    </div>

    <!-- Text content (hidden until loaded) -->
    <div id="textState" style="display:none;">
      <div class="file-icon-wrap">💬</div>
      <h1 class="page-title">文字 <span>内容</span></h1>
      <p class="page-sub">以下是二维码包含的文字信息</p>
      <div class="text-content-wrap" id="textContentDisplay"></div>
      <button class="download-btn" onclick="copyTextContent()">
        <span class="btn-icon">📋</span>
        <span>复制文字内容</span>
      </button>
    </div>

    <!-- Error state -->
    <div id="errorState" style="display:none; text-align:center;">
      <div style="font-size:56px;margin-bottom:16px;">😕</div>
      <h1 class="page-title" style="font-size:22px;">无法读取内容</h1>
      <p class="page-sub" id="errorMsg">二维码信息不完整，请重新扫码</p>
      <a href="index.html" class="download-btn" style="margin-top:8px;">
        <span class="btn-icon">🔙</span>
        <span>返回生成器</span>
      </a>
    </div>
  </div>

  <footer class="footer">
    <p>由 <a href="index.html">码上传递</a> 提供服务 · 文件安全可靠</p>
  </footer>

  <script>
    // ── Parse hash params ──────────────────────────
    function parseHash() {
      const hash = window.location.hash.slice(1);
      if (!hash) return null;
      try {
        return Object.fromEntries(new URLSearchParams(hash));
      } catch { return null; }
    }

    function getFileIcon(name, type) {
      if (type && type.startsWith('image/')) return '🖼️';
      if (type && type.startsWith('video/')) return '🎬';
      if (type && type.startsWith('audio/')) return '🎵';
      const n = (name || '').toLowerCase();
      if (n.endsWith('.pdf')) return '📄';
      if (n.endsWith('.doc') || n.endsWith('.docx')) return '📝';
      if (n.endsWith('.xls') || n.endsWith('.xlsx') || n.endsWith('.csv')) return '📊';
      if (n.endsWith('.ppt') || n.endsWith('.pptx')) return '📑';
      if (n.endsWith('.zip') || n.endsWith('.rar') || n.endsWith('.7z')) return '🗜️';
      return '📦';
    }

    function getTypeName(name, type) {
      if (type && type.startsWith('image/')) return '图片文件';
      if (type && type.startsWith('video/')) return '视频文件';
      if (type && type.startsWith('audio/')) return '音频文件';
      const n = (name || '').toLowerCase();
      if (n.endsWith('.pdf')) return 'PDF文档';
      if (n.endsWith('.doc') || n.endsWith('.docx')) return 'Word文档';
      if (n.endsWith('.xls') || n.endsWith('.xlsx')) return 'Excel表格';
      if (n.endsWith('.csv')) return 'CSV数据';
      if (n.endsWith('.ppt') || n.endsWith('.pptx')) return 'PowerPoint演示文稿';
      if (n.endsWith('.zip') || n.endsWith('.rar')) return '压缩文件';
      return '文件';
    }

    function isFileUrl(url) {
      return url.startsWith('http://') || url.startsWith('https://');
    }

    // ── Init ──────────────────────────────────────
    function init() {
      const params = parseHash();

      // Hide loading
      document.getElementById('loadingState').style.display = 'none';

      if (!params) {
        showError('没有找到有效的内容，请重新扫码或生成新的二维码');
        return;
      }

      const { url, name, type } = params;

      if (url && isFileUrl(url)) {
        // File download
        document.getElementById('fileIconWrap').textContent = getFileIcon(name, type);
        document.getElementById('displayName').textContent = decodeURIComponent(name || '未知文件');
        document.getElementById('displayType').textContent = getTypeName(name, type);
        const downloadBtn = document.getElementById('downloadBtn');
        downloadBtn.href = decodeURIComponent(url);
        document.getElementById('directLinkText').textContent = decodeURIComponent(url);
        document.getElementById('fileState').style.display = 'block';

        // Auto-trigger download on mobile after short delay
        if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
          setTimeout(() => { downloadBtn.click(); }, 800);
        }
      } else if (url) {
        // Plain text content
        document.getElementById('textContentDisplay').textContent = decodeURIComponent(url);
        document.getElementById('textState').style.display = 'block';
      } else {
        showError('二维码数据格式不正确');
      }
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorState').style.display = 'block';
    }

    function copyLink() {
      const text = document.getElementById('directLinkText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        const orig = btn.textContent;
        btn.textContent = '已复制!';
        btn.style.background = 'rgba(56,239,125,0.2)';
        btn.style.color = '#38ef7d';
        setTimeout(() => { btn.textContent = orig; btn.style = ''; }, 2000);
      }).catch(() => alert('请手动复制：' + text));
    }

    function copyTextContent() {
      const text = document.getElementById('textContentDisplay').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.download-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="btn-icon">✅</span><span>已复制！</span>';
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      }).catch(() => alert(text));
    }

    init();
  </script>
</body>
</html>
